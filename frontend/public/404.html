<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: store the path in sessionStorage and redirect to root
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search + l.hash;
      l.replace(l.origin + l.pathname.split('/').slice(0, 2).join('/') + '/?p=1');
    </script>
  </head>
  <body></body>
</html>
